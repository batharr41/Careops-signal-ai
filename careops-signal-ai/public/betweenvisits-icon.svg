<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="120" height="120" rx="24" fill="url(#bgGrad)"/>
  <rect x="1" y="1" width="118" height="118" rx="23" fill="none" stroke="#0EA5E920" stroke-width="1.5"/>
  <polyline
    points="10,60 28,60 36,60 44,22 54,98 64,46 72,60 92,60 110,60"
    fill="none"
    stroke="url(#pulseGrad)"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />
  <circle cx="44" cy="22" r="5" fill="#6366F1" filter="url(#glow)"/>
  <circle cx="54" cy="98" r="5" fill="#0EA5E9" filter="url(#glow)"/>
  <text
    x="88"
    y="112"
    font-family="'Georgia', serif"
    font-size="11"
    font-style="italic"
    fill="#334155"
    text-anchor="middle"
  >bv</text>
</svg>
